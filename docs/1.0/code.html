<!doctype html>

<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
      name="viewport"
    />
    <title>WeChat Chat Screen</title>
    <!-- Tailwind CSS v3 CDN with plugins -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <style data-purpose="typography">
      /* Using standard system sans-serif font for native feel */
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue',
          Arial, 'Noto Sans', sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji',
          'Segoe UI Symbol', 'Noto Color Emoji';
        -webkit-tap-highlight-color: transparent;
      }
    </style>
    <style data-purpose="custom-layout">
      /* Standard WeChat bubble styles */
      .chat-bubble-left {
        position: relative;
        background-color: #ffffff;
        border-radius: 6px;
        padding: 8px 12px;
        max-width: 75%;
        word-wrap: break-word;
        font-size: 16px;
        line-height: 1.5;
        color: #000000;
      }
      .chat-bubble-right {
        position: relative;
        background-color: #95ec69;
        border-radius: 6px;
        padding: 8px 12px;
        max-width: 75%;
        word-wrap: break-word;
        font-size: 16px;
        line-height: 1.5;
        color: #000000;
      }
      /* Fixed height for the message container to scroll */
      .message-container {
        height: calc(100vh - 104px - 56px); /* Status + Nav - Input bar */
        overflow-y: auto;
      }
      /* Avatar rounding */
      .avatar-rounded {
        border-radius: 4px;
      }
    </style>
  </head>
  <body class="flex h-screen flex-col overflow-hidden bg-[#EDEDED]">
    <!-- BEGIN: Status Bar -->
    <header
      class="flex items-center justify-between bg-[#EDEDED] px-4 pb-1 pt-1 text-[13px] font-medium text-black"
      data-purpose="status-bar"
    >
      <div class="flex items-center">
        <span>20:41</span>
      </div>
      <div class="flex items-center space-x-1.5">
        <!-- Bluetooth icon approximation -->
        <svg class="h-3.5 w-3.5" fill="currentColor" viewbox="0 0 24 24">
          <path d="M7,7L17,17L12,22V2L17,7L7,17"></path>
        </svg>
        <!-- Signal icon -->
        <svg class="h-3.5 w-3.5" fill="currentColor" viewbox="0 0 24 24">
          <path d="M2,22H22V2L2,22Z"></path>
        </svg>
        <!-- WiFi icon -->
        <svg class="h-3.5 w-3.5" fill="currentColor" viewbox="0 0 24 24">
          <path
            d="M12,21L15.6,16.2C14.6,15.45 13.35,15 12,15C10.65,15 9.4,15.45 8.4,16.2L12,21M12,3C7.95,3 4.21,4.34 1.2,6.6L3,9C5.5,7.12 8.62,6 12,6C15.38,6 18.5,7.12 21,9L22.8,6.6C19.79,4.34 16.05,3 12,3Z"
          ></path>
        </svg>
        <!-- Battery icon -->
        <div class="relative h-2.5 w-5 rounded-sm border border-black/40">
          <div class="h-full w-4 bg-black"></div>
        </div>
      </div>
    </header>
    <!-- END: Status Bar -->
    <!-- BEGIN: Navigation Bar -->
    <nav
      class="flex items-center justify-between border-b border-gray-300/30 bg-[#EDEDED] px-4 py-3"
      data-purpose="main-navigation"
    >
      <div class="flex w-1/4 items-center">
        <!-- Back Arrow -->
        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24">

            d="M15 19l-7-7 7-7"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
          ></path>
        </svg>
        <span
          class="-ml-1 rounded-full bg-[#D1D1D1] px-1.5 py-0.5 text-[10px] text-white"
          >5</span

      </div>
      <div class="w-2/4 text-center">
        <h1 class="text-[17px] font-bold">吴琳</h1>
      </div>
      <div class="flex w-1/4 justify-end">
        <!-- Three dots menu -->

          ></path>

      </div>
    </nav>

    <!-- END: Chat Content Area -->
    <!-- BEGIN: Bottom Toolbar -->
    <footer
      class="flex items-center space-x-3 border-t border-gray-300/50 bg-[#F7F7F7] px-3 py-2 pb-8"
      data-purpose="bottom-toolbar"
    >
      <!-- Voice Icon -->
      <div class="p-1">
        <svg
          class="h-7 w-7 text-black/80"
          fill="none"
          stroke="currentColor"
          viewbox="0 0 24 24"
        >

            d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.5"

      </div>
      <!-- Input Box -->

        <input
          class="w-full rounded-md border-none bg-white px-3 py-2 text-[16px] focus:ring-0"
          placeholder=""
          type="text"
        />

      <!-- Emoji Icon -->

        <svg
          class="h-7 w-7 text-black/80"
          fill="none"
          stroke="currentColor"
          viewbox="0 0 24 24"

        </svg>
      </div>
      <!-- Add Icon -->

        <svg
          class="h-7 w-7 text-black/80"
          fill="none"
          stroke="currentColor"
          viewbox="0 0 24 24"
        >
          <path
            d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"
            stroke-linecap="round"
            stroke-linejoin="round"

      </div>
